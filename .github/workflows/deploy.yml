# C10 — Deploy: Build + test, then prepare for TestFlight.
# When App Store Connect API key secrets are set, runs fastlane beta (build + TestFlight upload).
# Otherwise: build archive + artifact for manual upload (unchanged behavior).

name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Always run tests first (same as test.yml)
      - name: Run tests (same as test.yml)
        working-directory: ios
        run: |
          xcodebuild -scheme CatRunner \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            test 2>&1 | tee deploy-test.log

      # When App Store Connect API key is present: use fastlane beta (build + upload).
      # When absent: build archive and upload artifact for manual TestFlight (fallback).
      - name: Check for TestFlight automation secrets
        id: fastlane-secrets
        run: |
          if [ -n "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" ] && [ -n "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" ]; then
            if [ -n "${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}" ] || [ -n "${{ secrets.APP_STORE_CONNECT_KEY_PATH }}" ]; then
              echo "available=true" >> $GITHUB_OUTPUT
            else
              echo "available=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Install fastlane (for beta lane)
        if: steps.fastlane-secrets.outputs.available == 'true'
        run: gem install fastlane

      - name: Build and upload to TestFlight (fastlane beta)
        if: steps.fastlane-secrets.outputs.available == 'true'
        working-directory: ios
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          APP_STORE_CONNECT_KEY_PATH: ${{ secrets.APP_STORE_CONNECT_KEY_PATH }}
        run: fastlane beta

      - name: Build archive (manual path — when secrets not set)
        if: steps.fastlane-secrets.outputs.available != 'true'
        working-directory: ios
        run: |
          xcodebuild -scheme CatRunner \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath build/CatRunner.xcarchive \
            archive 2>&1 | tee deploy-build.log

      - name: Deploy summary
        run: |
          echo "## Deploy summary" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.fastlane-secrets.outputs.available }}" = "true" ]; then
            echo "**TestFlight:** Automated via \`fastlane beta\`. Build uploaded to App Store Connect; check TestFlight for processing." >> $GITHUB_STEP_SUMMARY
          else
            echo "**TestFlight:** Manual upload. Download \`CatRunner-archive\` artifact, export from \`ios/build/CatRunner.xcarchive\` (or Xcode Organizer), then upload to App Store Connect." >> $GITHUB_STEP_SUMMARY
            echo "To enable automation: add GitHub secrets \`APP_STORE_CONNECT_KEY_ID\`, \`APP_STORE_CONNECT_ISSUER_ID\`, and \`APP_STORE_CONNECT_KEY_CONTENT\` (or \`APP_STORE_CONNECT_KEY_PATH\`). See \`ios/fastlane/README.md\`." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload archive (for manual TestFlight)
        if: steps.fastlane-secrets.outputs.available != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: CatRunner-archive
          path: ios/build/CatRunner.xcarchive

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs
          path: |
            ios/deploy-test.log
            ios/deploy-build.log
          if-no-files-found: ignore
